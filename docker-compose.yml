version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: adota_pet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-adota_pet}
      MYSQL_USER: ${DB_USER:-adota_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-adota_pass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: adota_pet_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-adota_pet}
      DB_USER: ${DB_USER:-adota_user}
      DB_PASSWORD: ${DB_PASSWORD:-adota_pass}
      SESSION_SECRET: ${SESSION_SECRET:-supersecretkey_change_in_production}
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./frontend:/app/public
    command: npm run dev

volumes:
  db_data:
