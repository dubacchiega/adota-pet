<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Adota Pet</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <header>
    <nav>
      <a href="/" class="logo">🐾 Adota Pet</a>
      <ul class="nav-links">
        <li><a href="/">← Início</a></li>
        <li id="nav-painel"   style="display:none"><a href="/pages/painel.html">Meu Painel</a></li>
        <li id="nav-nome"     style="display:none"></li>
        <li id="nav-logout"   style="display:none"><button onclick="logout()">Sair</button></li>
        <li id="nav-login"    style="display:none"><a href="/pages/login.html"  class="btn btn-secundario">Entrar</a></li>
        <li id="nav-cadastro" style="display:none"><a href="/pages/cadastro.html" class="btn btn-primario">Cadastrar</a></li>
      </ul>
    </nav>
  </header>

  <main class="pagina-auth">
    <div class="card-auth">
      <div class="card-auth-emoji">🐾</div>
      <h1>Bem-vindo de volta!</h1>
      <p class="subtitulo">Entre para ver e gerenciar adoções</p>

      <form id="form-login" novalidate>
        <div class="form-grupo">
          <div class="campo">
            <label for="email">E-mail <span class="req">*</span></label>
            <input type="email" id="email" name="email" placeholder="seu@email.com" required autocomplete="email">
          </div>
          <div class="campo">
            <label for="senha">Senha <span class="req">*</span></label>
            <input type="password" id="senha" name="senha" placeholder="••••••" required autocomplete="current-password">
          </div>

          <div id="alerta-login" class="alerta" role="alert"></div>

          <button type="submit" class="btn btn-primario" style="width:100%;justify-content:center;">
            Entrar
          </button>
        </div>
      </form>

      <p class="link-alterno">
        Não tem conta? <a href="/pages/cadastro.html">Cadastre-se grátis</a>
      </p>
    </div>
  </main>

  <footer>
    <p>🐾 Adota Pet &mdash; Projeto acadêmico 2026</p>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
